name: Prover Benchmark

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  benchmark:
    name: Run prover benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run benchmark and diff against master
        run: |
          python3 Source/Scripts/run_benchmark.py \
            --mode fast \
            --compare-with origin/master \
            | tee /tmp/benchmark.log

      - name: Publish diff to job summary
        if: always()
        run: |
          {
            echo '## Benchmark diff (origin/master → PR branch)'
            echo '```'
            cat /tmp/benchmark.log 2>/dev/null || echo '(missing)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prover-benchmark
          path: Source/Launchers/GeoGen.MainLauncher/bin/Release/net10.0/ProverBenchmark
          if-no-files-found: warn
