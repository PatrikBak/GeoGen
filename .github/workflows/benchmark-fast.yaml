name: Prover Benchmark (fast)

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

jobs:
  benchmark:
    name: Run prover benchmark (fast)
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request'
          && contains(github.event.pull_request.labels.*.name, 'benchmark')
          && (github.event.action != 'labeled' || github.event.label.name == 'benchmark'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run benchmark
        run: uv run --script Source/Scripts/run_benchmark.py --mode fast --compare-with origin/master
